{{- if .Values.jobMetricsExporter.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iap.fullname" . }}-job-metrics-exporter
  labels:
    {{- include "iap.labels" . | nindent 4 }}
    app.kubernetes.io/component: "job-metrics-exporter"
  annotations:
    kubernetes.io/description: "Itential Automation Platform Job Metrics Exporter."
    {{- include "iap.annotations" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "iap.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "job-metrics-exporter"
  template:
    metadata:
      labels:
        {{- include "iap.labels" . | nindent 8 }}
        app.kubernetes.io/component: "job-metrics-exporter"
      annotations:
        kubernetes.io/description: "Itential Automation Platform Job Metrics Exporter."
        {{- include "iap.annotations" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iap.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: job-metrics-exporter
          image: "{{ .Values.jobMetricsExporter.image.repository }}:{{ .Values.jobMetricsExporter.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: job-metrics
              containerPort: {{ .Values.jobMetricsExporter.port | default 9477 }}
              protocol: TCP
          env:
            - name: ITENTIAL_JOB_METRIC_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jobMetricsExporter.mongoSecretName }}
                  key: {{ .Values.jobMetricsExporter.mongoSecretKey }}
            {{- if .Values.jobMetricsExporter.mongoDatabase }}
            - name: ITENTIAL_JOB_METRIC_MONGO_DATABASE
              value: {{ .Values.jobMetricsExporter.mongoDatabase | quote }}
            {{- end }}
            - name: ITENTIAL_JOB_METRIC_CHANGE_STREAM_ENABLED
              value: {{ .Values.jobMetricsExporter.changeStreamEnabled | quote }}
            - name: ITENTIAL_JOB_METRIC_POLLING_ENABLED
              value: {{ .Values.jobMetricsExporter.pollingEnabled | quote }}
            {{- if .Values.jobMetricsExporter.pollingEnabled }}
            - name: ITENTIAL_JOB_METRIC_POLLING_INTERVAL
              value: {{ .Values.jobMetricsExporter.pollingInterval | quote }}
            {{- end }}
            - name: ITENTIAL_JOB_METRIC_LOG_LEVEL
              value: {{ .Values.jobMetricsExporter.logLevel | quote }}
            - name: ITENTIAL_JOB_METRIC_LOG_FORMAT
              value: {{ .Values.jobMetricsExporter.logFormat | quote }}
            {{- if .Values.useTLS }}
            - name: ITENTIAL_JOB_METRIC_TLS_ENABLED
              value: "true"
            - name: ITENTIAL_JOB_METRIC_TLS_CERT_FILE
              value: /etc/ssl/platform/tls.crt
            - name: ITENTIAL_JOB_METRIC_TLS_KEY_FILE
              value: /etc/ssl/platform/tls.key
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.jobMetricsExporter.port | default 9477 }}
              scheme: {{ ternary "HTTPS" "HTTP" .Values.useTLS }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.jobMetricsExporter.port | default 9477 }}
              scheme: {{ ternary "HTTPS" "HTTP" .Values.useTLS }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          {{- if .Values.useTLS }}
          volumeMounts:
            - name: platform-cert-volume
              mountPath: /etc/ssl/platform
              readOnly: true
          {{- end }}
      {{- if .Values.useTLS }}
      volumes:
        - name: platform-cert-volume
          secret:
            secretName: {{ .Values.certificate.secretName | default (printf "%s-tls-secret" (include "iap.fullname" .)) }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
