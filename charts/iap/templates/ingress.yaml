{{- if .Values.ingress.enabled -}}
{{/* Build a list of TLS entries */}}
{{- $tlsList := list -}}
{{- if .Values.ingress.tls -}}
  {{- if kindIs "slice" .Values.ingress.tls -}}
    {{- range .Values.ingress.tls -}}
      {{- $tlsList = append $tlsList (dict "secretName" .secretName "hosts" (.hosts | default list)) -}}
    {{- end -}}
  {{- else -}}
    {{- $tlsList = append $tlsList (dict "secretName" .Values.ingress.tls.secretName "hosts" (.Values.ingress.tls.hosts | default list)) -}}
  {{- end -}}
{{- end -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "iap.fullname" . }}-ingress
  labels:
    {{- include "iap.labels" . | nindent 4 }}
    app.kubernetes.io/component: "ingress"
  annotations:
    kubernetes.io/description: "Itential Automation Platform Ingress. Contains load balanced access, individual access, and metrics."
    {{- include "iap.annotations" . | nindent 4 }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if $tlsList }}
  tls:
    {{- range $tlsList }}
    - hosts:
        {{- if .hosts }}
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
        {{- else }}
        {{- include "iap.ingressTLSHosts" $ | trim | nindent 8 }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
  # Load balanced access
  {{- if .Values.ingress.loadBalancer.enabled }}
  - host: {{ .Values.ingress.loadBalancer.host | quote }}
    http:
      paths:
      - backend:
          service:
            name: {{ .Values.service.name }}
            port:
              number: {{ .Values.service.port }}
        path: {{ .Values.ingress.loadBalancer.path | default "/" }}
        pathType: {{ .Values.ingress.pathType | default "Prefix" }}
      {{- if .Values.useWebSockets }}
      - backend:
          service:
            name: {{ .Values.service.name }}
            port:
              number: {{ .Values.websocketPort }}
        path: "/ws"
        pathType: "Prefix"
      {{- end }}
  {{- end }}
  # Direct access
  {{- if .Values.ingress.directAccess.enabled }}
  {{- range $i := until (.Values.replicaCount | int) }}
  - host: {{ include "iap.DirectAccessHost" (dict "Values" $.Values "Release" $.Release "Chart" $.Chart "Template" $.Template "iterator" $i) | quote }}
    http:
      paths:
      - backend:
          service:
            name: {{ $.Values.service.name }}-headless-{{ $i }}
            port:
              number: {{ $.Values.service.port }}
        path: {{ $.Values.ingress.directAccess.path | default "/" }}
        pathType: {{ $.Values.ingress.pathType | default "Prefix" }}
      {{- if and $.Values.processExporter $.Values.processExporter.enabled $.Values.processExporter.ingressEnabled }}
      - backend:
          service:
            name: {{ $.Values.service.name }}-headless-{{ $i }}
            port:
              name: process-metrics
        path: "/metrics"
        pathType: "Prefix"
      {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
