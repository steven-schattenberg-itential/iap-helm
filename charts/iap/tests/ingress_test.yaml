### Edge cases
  - it: should handle string replica count
    set:
      ingress:
        enabled: true
        directAccess:
          enabled: true
          baseDomain: example.com
        loadBalancer:
          enabled: false
      service:
        port: 443
      replicaCount: "3"
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 3
      - equal:
