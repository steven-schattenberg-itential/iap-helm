  - it: should include metrics path for all replicas when processExporter enabled and ingressEnabled true
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      processExporter:
        enabled: true
        ingressEnabled: true
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 3
      # Each rule should have both main path and metrics path
      - lengthEqual:
          path: spec.rules[0].http.paths
          count: 2
      - lengthEqual:
          path: spec.rules[1].http.paths
          count: 2
      - lengthEqual:
          path: spec.rules[2].http.paths
          count: 2
      # Verify metrics paths
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /metrics
      - equal:
          path: spec.rules[1].http.paths[1].path
          value: /metrics
      - equal:
          path: spec.rules[2].http.paths[1].path
          value: /metrics
      # Verify metrics backend service port names
      - equal:
          path: spec.rules[0].http.paths[1].backend.service.port.name
          value: process-metrics
      - equal:
          path: spec.rules[1].http.paths[1].backend.service.port.name
          value: process-metrics
      - equal:
          path: spec.rules[2].http.paths[1].backend.service.port.name
          value: process-metrics

  - it: should preserve service references with hostOverride
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
          hostOverride: "service-test"
      service:
        port: 8080
      replicaCount: 2
    asserts:
      # Service names should remain unchanged
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: iap-service-headless-0
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.name
          value: iap-service-headless-1
      # Port should be correct
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.port.number
          value: 8080