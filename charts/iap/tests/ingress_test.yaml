suite: test ingress template
templates:
  - ingress.yaml
tests:
  - it: should not create ingress when disabled
    set:
      ingress:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ingress when enabled
    set:
      ingress:
        enabled: true
        className: alb
        loadBalancer:
          enabled: true
          host: test.example.com
          path: /
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME-iap-ingress

  - it: should use custom ingress.name when set
    set:
      ingress:
        enabled: true
        name: "my-custom-ingress"
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 1
    asserts:
      - equal:
          path: metadata.name
          value: "my-custom-ingress"

  - it: should have correct API version and kind
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - equal:
          path: kind
          value: Ingress

  - it: should include labels from helper function
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - exists:
          path: metadata.labels
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]

  - it: should include annotations when provided
    set:
      ingress:
        enabled: true
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          custom.annotation/test: "value"
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/scheme"]
          value: internet-facing
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/target-type"]
          value: ip
      - equal:
          path: metadata.annotations["custom.annotation/test"]
          value: "value"

  - it: should set ingressClassName when provided
    set:
      ingress:
        enabled: true
        className: alb
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: spec.ingressClassName
          value: alb

### TLS Tests

  ## Simplified map form
  - it: should render TLS using simplified map form with auto-generated hosts
    set:
      ingress:
        enabled: true
        tls:
          secretName: iap-tls-secret
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 3
    asserts:
      - exists:
          path: spec.tls
      - lengthEqual:
          path: spec.tls
          count: 1
      - equal:
          path: spec.tls[0].secretName
          value: iap-tls-secret
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 4
      - contains:
          path: spec.tls[0].hosts
          content: iap.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-1.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-2.example.com

  - it: should render TLS simplified form with only load balancer host
    set:
      ingress:
        enabled: true
        tls:
          secretName: iap-tls-secret
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 1
      - equal:
          path: spec.tls[0].hosts[0]
          value: iap.example.com

  - it: should render TLS simplified form with only direct access hosts
    set:
      ingress:
        enabled: true
        tls:
          secretName: iap-tls-secret
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 2
    asserts:
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 2
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-1.example.com

  - it: should use manual hosts overriding auto-generation in simplified form
    set:
      ingress:
        enabled: true
        tls:
          secretName: iap-tls-secret
          hosts:
            - admin.example.com
            - cdn.example.com
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 2
    asserts:
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 2  # only the manually provided hosts
      - contains:
          path: spec.tls[0].hosts
          content: admin.example.com
      - contains:
          path: spec.tls[0].hosts
          content: cdn.example.com
      - notContains:
          path: spec.tls[0].hosts
          content: iap.example.com
      - notContains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-0.example.com

  - it: should use hostOverride in TLS auto-generated hosts with simplified form
    set:
      ingress:
        enabled: true
        tls:
          secretName: iap-tls-secret
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: true
          baseDomain: example.com
          hostOverride: iap-prod
      service:
        port: 443
      replicaCount: 2
    asserts:
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 3
      - contains:
          path: spec.tls[0].hosts
          content: iap.example.com
      - contains:
          path: spec.tls[0].hosts
          content: iap-prod-0.example.com
      - contains:
          path: spec.tls[0].hosts
          content: iap-prod-1.example.com

  ## List form
  - it: should render TLS using list form with no hosts — auto-generated only
    set:
      ingress:
        enabled: true
        tls:
          - secretName: iap-tls-secret
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 3
    asserts:
      - exists:
          path: spec.tls
      - lengthEqual:
          path: spec.tls
          count: 1
      - equal:
          path: spec.tls[0].secretName
          value: iap-tls-secret
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 4
      - contains:
          path: spec.tls[0].hosts
          content: iap.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-1.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-2.example.com

  - it: should use manual hosts overriding auto-generation in list form
    set:
      ingress:
        enabled: true
        tls:
          - secretName: iap-tls-secret
            hosts:
              - admin.example.com
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 2
    asserts:
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 1  # only the manually provided host
      - contains:
          path: spec.tls[0].hosts
          content: admin.example.com
      - notContains:
          path: spec.tls[0].hosts
          content: iap.example.com
      - notContains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-0.example.com

  - it: should support multiple TLS secrets with list form
    set:
      ingress:
        enabled: true
        tls:
          - secretName: primary-tls-secret
          - secretName: secondary-tls-secret
        loadBalancer:
          enabled: true
          host: iap.example.com
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 2
    asserts:
      - lengthEqual:
          path: spec.tls
          count: 2
      - equal:
          path: spec.tls[0].secretName
          value: primary-tls-secret
      - equal:
          path: spec.tls[1].secretName
          value: secondary-tls-secret
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 3
      - lengthEqual:
          path: spec.tls[1].hosts
          count: 3

  ## List form — manual hosts override auto-generation
  - it: should use manual hosts overriding auto-generation across multiple secrets
    set:
      ingress:
        enabled: true
        tls:
          - secretName: test-tls-secret
            hosts:
              - manual-1.example.com
              - manual-2.example.com
          - secretName: another-tls-secret
            hosts:
              - manual-3.example.com
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - exists:
          path: spec.tls
      - lengthEqual:
          path: spec.tls
          count: 2
      - equal:
          path: spec.tls[0].secretName
          value: test-tls-secret
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 2
      - contains:
          path: spec.tls[0].hosts
          content: manual-1.example.com
      - contains:
          path: spec.tls[0].hosts
          content: manual-2.example.com
      - notContains:
          path: spec.tls[0].hosts
          content: test.example.com
      - equal:
          path: spec.tls[1].secretName
          value: another-tls-secret
      - lengthEqual:
          path: spec.tls[1].hosts
          count: 1
      - contains:
          path: spec.tls[1].hosts
          content: manual-3.example.com
      - notContains:
          path: spec.tls[1].hosts
          content: test.example.com

  - it: should not include TLS when not provided
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - notExists:
          path: spec.tls

  - it: should use manual hosts overriding auto-generation for single secret
    set:
      ingress:
        enabled: true
        tls:
          - secretName: single-tls-secret
            hosts:
              - single.example.com
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - exists:
          path: spec.tls
      - lengthEqual:
          path: spec.tls
          count: 1
      - equal:
          path: spec.tls[0].secretName
          value: single-tls-secret
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 1  # only the manually provided host
      - equal:
          path: spec.tls[0].hosts[0]
          value: single.example.com
      - notContains:
          path: spec.tls[0].hosts
          content: test.example.com

### Load balancer tests
  - it: should create load balancer rule when enabled
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
          path: /
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 1
      - equal:
          path: spec.rules[0].host
          value: lb.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: iap-service
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 443

  - it: should not create load balancer rule when disabled
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 0

  - it: should use custom path for load balancer
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
          path: /api
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api

  - it: should use default path when not specified
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /

  - it: should use custom pathType
    set:
      ingress:
        enabled: true
        pathType: Exact
        loadBalancer:
          enabled: true
          host: lb.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Exact

  - it: should use default pathType when not specified
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  - it: should use correct service port
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
        directAccess:
          enabled: false
      service:
        port: 8080
      replicaCount: 3
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

#### Direct Access
  - it: should create direct access rules when enabled
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
          path: /
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 3
      - equal:
          path: spec.rules[0].host
          value: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - equal:
          path: spec.rules[1].host
          value: RELEASE-NAME-iap-NAMESPACE-1.example.com
      - equal:
          path: spec.rules[2].host
          value: RELEASE-NAME-iap-NAMESPACE-2.example.com

  - it: should not create direct access rules when disabled
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 0

  - it: should create correct service references for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 3
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: iap-service-headless-0
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.name
          value: iap-service-headless-1
      - equal:
          path: spec.rules[2].http.paths[0].backend.service.name
          value: iap-service-headless-2

  - it: should use correct ports for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 8080
      replicaCount: 2
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.port.number
          value: 8080

  - it: should use custom path for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
          path: /api
      service:
        port: 443
      replicaCount: 2
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
      - equal:
          path: spec.rules[1].http.paths[0].path
          value: /api

  - it: should use default path when not specified for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 2
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[1].http.paths[0].path
          value: /

  - it: should handle single replica for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 1
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 1
      - equal:
          path: spec.rules[0].host
          value: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: iap-service-headless-0

  - it: should handle large replica count for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 5
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 5
      - equal:
          path: spec.rules[0].host
          value: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - equal:
          path: spec.rules[4].host
          value: RELEASE-NAME-iap-NAMESPACE-4.example.com
      - equal:
          path: spec.rules[4].http.paths[0].backend.service.name
          value: iap-service-headless-4

  - it: should handle zero replicas for direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 0
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 0

### Combination tests
  - it: should create both load balancer and direct access rules
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
          path: /
        directAccess:
          enabled: true
          baseDomain: example.com
          path: /
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 4  # 1 load balancer + 3 direct access
      # Load balancer rule
      - equal:
          path: spec.rules[0].host
          value: lb.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: iap-service
      # Direct access rules
      - equal:
          path: spec.rules[1].host
          value: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.name
          value: iap-service-headless-0
      - equal:
          path: spec.rules[2].host
          value: RELEASE-NAME-iap-NAMESPACE-1.example.com
      - equal:
          path: spec.rules[2].http.paths[0].backend.service.name
          value: iap-service-headless-1
      - equal:
          path: spec.rules[3].host
          value: RELEASE-NAME-iap-NAMESPACE-2.example.com
      - equal:
          path: spec.rules[3].http.paths[0].backend.service.name
          value: iap-service-headless-2

  - it: should handle different paths for load balancer and direct access
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
          path: /api
        directAccess:
          enabled: true
          baseDomain: example.com
          path: /direct
      service:
        port: 443
      replicaCount: 2
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
      - equal:
          path: spec.rules[1].http.paths[0].path
          value: /direct
      - equal:
          path: spec.rules[2].http.paths[0].path
          value: /direct

  - it: should work with complete configuration including TLS
    set:
      ingress:
        enabled: true
        className: alb
        pathType: Prefix
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
        tls:
          secretName: example-tls
        loadBalancer:
          enabled: true
          host: lb.example.com
          path: /
        directAccess:
          enabled: true
          baseDomain: example.com
          path: /
      service:
        port: 443
      replicaCount: 2
    asserts:
      - equal:
          path: spec.ingressClassName
          value: alb
      - exists:
          path: metadata.annotations
      - exists:
          path: spec.tls
      - equal:
          path: spec.tls[0].secretName
          value: example-tls
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 3  # 1 LB host + 2 direct access hosts
      - contains:
          path: spec.tls[0].hosts
          content: lb.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - contains:
          path: spec.tls[0].hosts
          content: RELEASE-NAME-iap-NAMESPACE-1.example.com
      - lengthEqual:
          path: spec.rules
          count: 3
      - equal:
          path: spec.rules[0].host
          value: lb.example.com
      - equal:
          path: spec.rules[1].host
          value: RELEASE-NAME-iap-NAMESPACE-0.example.com
      - equal:
          path: spec.rules[2].host
          value: RELEASE-NAME-iap-NAMESPACE-1.example.com

  - it: should handle load balancer only configuration
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: true
          host: lb.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 3
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 1
      - equal:
          path: spec.rules[0].host
          value: lb.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: iap-service

  - it: should handle direct access only configuration
    set:
      ingress:
        enabled: true
        loadBalancer:
          enabled: false
        directAccess:
          enabled: true
          baseDomain: example.com
      service:
        port: 443
      replicaCount: 2
    asserts:
      - lengthEqual:
