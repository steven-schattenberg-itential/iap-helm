        enabled: true
        annotations:
          alb.ingress.kubernetes.io/backend-protocol: HTTPS
          alb.ingress.kubernetes.io/healthcheck-path: /health
          alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
          external-dns.alpha.kubernetes.io/hostname: test.example.com,api.example.com
        loadBalancer:
          enabled: true
          host: test.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 1
    asserts:
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/backend-protocol"]
          value: HTTPS
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/healthcheck-path"]
          value: /health
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/listen-ports"]
          value: '[{"HTTPS": 443}]'
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: test.example.com,api.example.com

  - it: should use manual hosts overriding auto-generation across multiple secrets with many hosts
    set:
      ingress:
        enabled: true
        tls:
          - secretName: wildcard-tls
            hosts:
              - "*.example.com"
              - example.com
          - secretName: specific-tls
            hosts:
              - api.example.com
              - app.example.com
              - admin.example.com
        loadBalancer:
          enabled: true
          host: lb.example.com
        directAccess:
          enabled: false
      service:
        port: 443
      replicaCount: 1
    asserts:
      - lengthEqual:
          path: spec.tls
          count: 2
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 2  # only the manually provided hosts
      - lengthEqual:
          path: spec.tls[1].hosts
          count: 3  # only the manually provided hosts
      - contains:
          path: spec.tls[0].hosts
          content: "*.example.com"
      - notContains:
          path: spec.tls[0].hosts
          content: lb.example.com
      - contains:
          path: spec.tls[1].hosts
          content: admin.example.com
      - notContains:
          path: spec.tls[1].hosts
          content: lb.example.com

  - it: should handle different pathTypes for different rules
    set:
